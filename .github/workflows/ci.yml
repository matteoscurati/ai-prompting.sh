name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Astro check (types + templates)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify dist/ is non-empty
        run: |
          test -d dist || { echo "::error::dist/ missing"; exit 1; }
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }

      - name: Bundle size budget (home JS)
        run: |
          JS_BYTES=$(find dist -name "*.js" -exec gzip -c {} \; | wc -c)
          echo "Total JS gzipped: $JS_BYTES bytes"
          if [ "$JS_BYTES" -gt 51200 ]; then
            echo "::warning::Total gzipped JS exceeds 50KB budget"
          fi
